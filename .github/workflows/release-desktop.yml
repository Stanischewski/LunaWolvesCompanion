name: Release Desktop Agent

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Monorepo-Dependencies installieren
        run: pnpm install

      - name: App-Version auf Release-Tag setzen
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          jq ".version = \"$VERSION\"" apps/desktop/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json apps/desktop/src-tauri/tauri.conf.json

      - name: Tauri-App bauen und Artifacts hochladen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ github.event.release.id }}
