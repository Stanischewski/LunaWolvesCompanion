<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luna Wolves Agent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Login-Ansicht: sichtbar, solange nicht angemeldet -->
    <div id="login-view" class="login-view">
      <main class="login-card">
        <header>
          <h1>Luna Wolves Agent</h1>
          <p class="subtitle">
            Synchronisiert deine WoW-Addon-Daten mit dem Gilden-Server.
          </p>
        </header>

        <label for="login-api-url">API-URL</label>
        <input id="login-api-url" type="text" placeholder="http://localhost:3001" autocomplete="off" spellcheck="false" />

        <button type="button" id="login-btn">Mit Battle.net anmelden</button>

        <div id="login-status" class="status status-idle">Bereit.</div>
      </main>
    </div>

    <!-- Hauptansicht: sichtbar nach erfolgreicher Anmeldung -->
    <div id="app-view" class="app-view" hidden>
      <aside class="sidebar">
        <div class="sidebar-brand">Luna Wolves</div>
        <nav class="sidebar-nav">
          <button type="button" class="nav-item" data-tab="status">Status</button>
          <button type="button" class="nav-item" data-tab="settings">Einstellungen</button>
        </nav>
        <div class="sidebar-foot">
          <span id="login-state" class="badge badge-out">Nicht angemeldet</span>
          <button type="button" id="logout-btn" class="logout-btn">Abmelden</button>
        </div>
      </aside>

      <main class="content">
        <!-- Reiter: Status -->
        <section id="tab-status" class="tab-panel">
          <h2>Status</h2>
          <div class="card">
            <div class="card-row">
              <span class="card-label">Server</span>
              <span id="status-api-url" class="card-value">&mdash;</span>
            </div>
            <div class="card-row">
              <span class="card-label">SavedVariables</span>
              <span id="status-sv-path" class="card-value">&mdash;</span>
            </div>
          </div>
          <button type="button" id="sync-now">Jetzt synchronisieren</button>
        </section>

        <!-- Reiter: Einstellungen -->
        <section id="tab-settings" class="tab-panel" hidden>
          <h2>Einstellungen</h2>
          <form id="settings-form">
            <label for="api-url">API-URL</label>
            <input id="api-url" type="text" placeholder="http://localhost:3001" autocomplete="off" spellcheck="false" />

            <label for="sv-path">SavedVariables-Datei</label>
            <div class="input-row">
              <input id="sv-path" type="text" placeholder="C:\…\SavedVariables\LunaWolvesDB.lua" autocomplete="off" spellcheck="false" />
              <button type="button" id="detect-btn" class="secondary">Automatisch suchen</button>
            </div>

            <button type="submit">Einstellungen speichern</button>
          </form>
        </section>

        <!-- Update verfuegbar -->
        <div id="update-banner" class="update-banner" hidden>
          <span id="update-text"></span>
          <button type="button" id="update-btn">Jetzt installieren</button>
        </div>

        <!-- Hinweis auf ausstehende Web-DKP-Eintraege -->
        <div id="pending-banner" class="pending-banner" hidden>
          <span id="pending-text"></span>
        </div>

        <!-- Statuszeile: ueber beide Reiter hinweg sichtbar -->
        <div id="status" class="status status-idle">Bereit.</div>
      </main>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
