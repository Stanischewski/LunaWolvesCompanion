<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luna Wolves Agent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Luna Wolves Agent</h1>
        <p class="subtitle">
          Synchronisiert deine WoW-Addon-Daten mit dem Gilden-Server.
        </p>
      </header>

      <form id="settings-form">
        <label for="api-url">API-URL</label>
        <input id="api-url" type="text" placeholder="http://localhost:3001" autocomplete="off" spellcheck="false" />

        <label for="token">Zugangs-Token (JWT)</label>
        <input id="token" type="password" placeholder="eyJ…" autocomplete="off" />

        <label for="sv-path">SavedVariables-Datei</label>
        <input id="sv-path" type="text" placeholder="C:\…\SavedVariables\LunaWolvesDB.lua" autocomplete="off" spellcheck="false" />

        <div class="buttons">
          <button type="submit">Speichern</button>
          <button type="button" id="sync-now" class="secondary">Jetzt synchronisieren</button>
        </div>
      </form>

      <div id="status" class="status status-idle">Bereit.</div>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
